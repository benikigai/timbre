<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Timbre</title>
    <meta name="description" content="A multi-agent content engine that monitors your industry, researches what matters, and publishes in your voice." />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: #f5f5f0; font-family: ui-serif, Georgia, serif; }
      main { min-height: 100%; display: grid; place-items: center; padding: 2rem; }
      .card { max-width: 36rem; text-align: center; }
      h1 { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 500; letter-spacing: -0.02em; margin: 0 0 1rem; }
      p { font-size: 1.125rem; line-height: 1.6; opacity: 0.7; margin: 0 0 2rem; }
      .accent { color: #c44; }
      .dot { display: inline-block; width: 8px; height: 8px; background: #c44; border-radius: 50%; margin-right: 8px; vertical-align: middle; animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
      small { font-family: ui-monospace, monospace; font-size: 0.75rem; opacity: 0.4; letter-spacing: 0.05em; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Timbre<span class="accent">.</span></h1>
        <p>A multi-agent content engine that researches what matters and publishes in your voice.</p>
        <small><span class="dot"></span>Scout online · Building live at I/O Hackathon 2026</small>
      </div>
    </main>
  </body>
</html>
